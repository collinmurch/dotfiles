#:schema https://developers.openai.com/codex/config-schema.json

personality = "friendly"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "xhigh"

web_search = "live"
suppress_unstable_features_warning = true

default_permissions = "sandbox"

[permissions.sandbox]
extends = ":workspace"
network = {
  enabled = true
}
workspace_roots = {
  "/private/tmp" = true,
  "~/.config/gws" = true,
  "~/.claude" = true
}

[features]
memories = false
apps = false
prevent_idle_sleep = true

[tui]
notifications = false
status_line = ["current-dir", "git-branch", "context-usage"]
theme = "Poimandres"

[sandbox_workspace_write]
network_access = true
writable_roots = [ "/private/tmp" ]
